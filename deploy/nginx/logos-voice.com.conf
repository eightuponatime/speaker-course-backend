server {
  listen 80;
  listen [::]:80;
  server_name logos-voice.com www.logos-voice.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://logos-voice.com$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.logos-voice.com;

  ssl_certificate /etc/letsencrypt/live/logos-voice.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/logos-voice.com/privkey.pem;

  return 301 https://logos-voice.com$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name logos-voice.com;

  ssl_certificate /etc/letsencrypt/live/logos-voice.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/logos-voice.com/privkey.pem;

  client_max_body_size 250m;

  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  location / {
    proxy_pass http://127.0.0.1:8088;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;
  }
}
