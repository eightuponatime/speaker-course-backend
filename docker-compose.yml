services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-speaker_course}
      POSTGRES_USER: ${POSTGRES_USER:-speaker_course}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    ports:
      - "${DB_PORT:-127.0.0.1:5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-speaker_course}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-speaker_course}?sslmode=disable
      PORT: 8080
      ENV: production
      BUSINESS_TIMEZONE: ${BUSINESS_TIMEZONE:-Asia/Almaty}
      SESSION_TTL: ${SESSION_TTL:-720h}
      FRONTEND_URL: ${PUBLIC_URL:?set PUBLIC_URL in .env}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-${PUBLIC_URL}/auth/google/callback}
      BUNNY_STORAGE_ZONE: ${BUNNY_STORAGE_ZONE:-}
      BUNNY_STORAGE_PASSWORD: ${BUNNY_STORAGE_PASSWORD:-}
      BUNNY_STORAGE_ENDPOINT: ${BUNNY_STORAGE_ENDPOINT:-https://storage.bunnycdn.com}
      BUNNY_STORAGE_PUBLIC_BASE_URL: ${BUNNY_STORAGE_PUBLIC_BASE_URL:-}
      BUNNY_STREAM_LIBRARY_ID: ${BUNNY_STREAM_LIBRARY_ID:-}
      BUNNY_STREAM_API_KEY: ${BUNNY_STREAM_API_KEY:-}
      BUNNY_STREAM_EMBED_BASE_URL: ${BUNNY_STREAM_EMBED_BASE_URL:-https://iframe.mediadelivery.net/embed}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    expose:
      - "8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_COURSE_ID: ${VITE_COURSE_ID:-10000000-0000-0000-0000-000000000001}
        VITE_COURSE_SLUG: ${VITE_COURSE_SLUG:-homemade-bagels-for-beginners}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  postgres_data:
